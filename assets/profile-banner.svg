<svg width="1200" height="320" viewBox="0 0 1200 320" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="320" gradientUnits="userSpaceOnUse">
      <stop stop-color="#1a1b2e"/>
      <stop offset="1" stop-color="#16213e"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="320" fill="url(#bg)"/>

  <!-- Decorative circles -->
  <circle cx="1080" cy="50" r="200" fill="#f0c27f" fill-opacity="0.03"/>
  <circle cx="100" cy="300" r="160" fill="#7ec8a8" fill-opacity="0.03"/>

  <!-- Name -->
  <text x="72" y="90" fill="#e8e6e3" font-family="Georgia, 'Times New Roman', serif" font-size="46" font-weight="700">cnfjlhj</text>

  <!-- Tagline -->
  <text x="74" y="128" fill="#8b8da0" font-family="'Segoe UI', Arial, sans-serif" font-size="19">Practical AI collaboration workflows, reusable skills, and learning loops.</text>

  <!-- Three pillars -->
  <rect x="72" y="168" width="320" height="84" rx="10" fill="#f0c27f" fill-opacity="0.08" stroke="#f0c27f" stroke-opacity="0.2" stroke-width="1"/>
  <text x="92" y="204" fill="#f0c27f" font-family="'Segoe UI', Arial, sans-serif" font-size="12" font-weight="700" letter-spacing="2">01</text>
  <text x="118" y="204" fill="#e8e6e3" font-family="Georgia, 'Times New Roman', serif" font-size="18" font-weight="700">Grow yourself first</text>
  <text x="92" y="230" fill="#6a6a7a" font-family="'Segoe UI', Arial, sans-serif" font-size="13">Attention, judgment, ownership.</text>

  <rect x="424" y="168" width="340" height="84" rx="10" fill="#7ec8a8" fill-opacity="0.08" stroke="#7ec8a8" stroke-opacity="0.2" stroke-width="1"/>
  <text x="444" y="204" fill="#7ec8a8" font-family="'Segoe UI', Arial, sans-serif" font-size="12" font-weight="700" letter-spacing="2">02</text>
  <text x="470" y="204" fill="#e8e6e3" font-family="Georgia, 'Times New Roman', serif" font-size="18" font-weight="700">Then fix collaboration</text>
  <text x="444" y="230" fill="#6a6a7a" font-family="'Segoe UI', Arial, sans-serif" font-size="13">Make the human-tool loop usable.</text>

  <rect x="796" y="168" width="336" height="84" rx="10" fill="#7ba7d0" fill-opacity="0.08" stroke="#7ba7d0" stroke-opacity="0.2" stroke-width="1"/>
  <text x="816" y="204" fill="#7ba7d0" font-family="'Segoe UI', Arial, sans-serif" font-size="12" font-weight="700" letter-spacing="2">03</text>
  <text x="842" y="204" fill="#e8e6e3" font-family="Georgia, 'Times New Roman', serif" font-size="18" font-weight="700">Then evolve tools</text>
  <text x="816" y="230" fill="#6a6a7a" font-family="'Segoe UI', Arial, sans-serif" font-size="13">Skills that earn their complexity.</text>

  <!-- Bottom line -->
  <text x="72" y="298" fill="#4a4a5a" font-family="Georgia, 'Times New Roman', serif" font-size="13" font-style="italic">Better humans make better tool users. Not the other way around.</text>
</svg>
